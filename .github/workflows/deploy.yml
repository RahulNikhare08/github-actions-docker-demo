name: Docker Builder

on:
  push:
    branches: [ main ]

jobs:

    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Configure AWS
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-south-1

        - name: Login ECR
          uses: aws-actions/amazon-ecr-login@v2

        - name: Build Image
          run: |
             docker build -t github-actions-demo .

        - name: Tag Image
          run: |
            docker tag github-actions-demo:latest  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/github-actions-demo:latest

        - name: Push Image
          run: |
           docker push  ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/github-actions-demo:latest

    
    deploy:
        needs: build
        runs-on: ubuntu-latest

        steps:
        - name: Setup SSH Key
          run: |
            mkdir -p ~/.ssh

            echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa

            chmod 600 ~/.ssh/id_rsa

            ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

        - name: Deploy Container
          run: |
            ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF

            aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS --password-stdin \
            172571130712.dkr.ecr.ap-south-1.amazonaws.com

            docker pull \
            172571130712.dkr.ecr.ap-south-1.amazonaws.com/github-actions-demo:latest

            docker stop demo-app || true

            docker rm demo-app || true

            docker run -d \
            -p 80:5000 \
            --name demo-app \
            172571130712.dkr.ecr.ap-south-1.amazonaws.com/github-actions-demo:latest

            EOF